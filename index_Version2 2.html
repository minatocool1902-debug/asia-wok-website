<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asia Wok Velbert</title>
  <style>
    :root {
      --bg: #111;
      --bg-soft: #1a1a1a;
      --card: #222;
      --card-2: #2a2a2a;
      --text: #fff;
      --muted: #d5d5d5;
      --gold: #f1c40f;
      --red: #8B0000;
      --border: #3a3a3a;
      --shadow: 0 10px 25px rgba(0,0,0,.28);
      --radius: 16px;
      --grey: #5a5a5a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #101010 0%, #171717 100%);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, #8B0000, #5a0000);
      text-align: center;
      padding: 30px 16px;
      border-bottom: 4px solid var(--gold);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0;
      color: var(--gold);
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 1px;
    }

    header p {
      margin: 8px 0 0;
      color: #ffe9a8;
      font-size: 0.95rem;
    }

    .container {
      width: min(1240px, 92%);
      margin: 0 auto;
      padding: 24px 0 40px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 1fr 160px;
      gap: 12px;
      margin-bottom: 22px;
    }

    .toolbar input,
    .toolbar select,
    .toolbar button {
      width: 100%;
      padding: 14px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-soft);
      color: var(--text);
      font-size: 1rem;
    }

    .toolbar button {
      cursor: pointer;
      background: var(--red);
      border-color: #a31414;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .toolbar button:hover {
      filter: brightness(1.08);
      transform: scale(1.02);
    }

    .summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .summary h2 {
      margin: 0;
      color: var(--gold);
      font-size: 1.5rem;
    }

    .summary p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--card), #1d1d1d);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #696969;
      box-shadow: 0 15px 35px rgba(0,0,0,.4);
    }

    .card-image {
      width: 100%;
      height: 140px;
      background: linear-gradient(135deg, #4a4a4a, #5a5a5a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #3a3a3a;
      border-bottom: 1px solid var(--border);
    }

    .card-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-top {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0;
      color: var(--gold);
      font-size: 1.05rem;
      line-height: 1.3;
      flex: 1;
    }

    .price {
      white-space: nowrap;
      background: var(--red);
      border: 1px solid #a31414;
      border-radius: 8px;
      padding: 6px 12px;
      font-weight: bold;
      font-size: 0.95rem;
      color: var(--gold);
    }

    .desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
      min-height: 45px;
      flex: 1;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .badge {
      background: rgba(241,196,15,.12);
      border: 1px solid rgba(241,196,15,.25);
      color: #ffe08a;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 500;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 24px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-soft);
      display: none;
      grid-column: 1 / -1;
      font-size: 1.1rem;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.95);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
      gap: 20px;
      backdrop-filter: blur(4px);
    }

    .lightbox.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .lightbox-content {
      width: min(90vw, 900px);
      max-height: 70vh;
      background: linear-gradient(135deg, #4a4a4a, #5a5a5a);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #3a3a3a;
      aspect-ratio: 16/9;
    }

    .lightbox-info {
      color: white;
      text-align: center;
      max-width: 800px;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .lightbox-info strong {
      color: var(--gold);
      display: block;
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .close-btn {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      font-size: 1.5rem;
      cursor: pointer;
      background: var(--red);
      color: var(--gold);
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      transform: rotate(90deg) scale(1.1);
    }

    footer {
      background: linear-gradient(135deg, #8B0000, #5a0000);
      text-align: center;
      padding: 20px;
      border-top: 4px solid var(--gold);
      color: #ffe9a8;
      margin-top: 40px;
      font-size: 0.95rem;
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      }
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.8rem;
      }

      .toolbar {
        gap: 8px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const menuGrid = document.getElementById("menuGrid");
    const searchInput = document.getElementById("searchInput");
    const categoryFilter = document.getElementById("categoryFilter");
    const resetBtn = document.getElementById("resetBtn");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");

    const lightbox = document.getElementById("lightbox");
    const lightboxInfo = document.getElementById("lightboxInfo");
    const closeBtn = document.getElementById("closeBtn");

    function initCategories() {
      const categories = [...new Set(menuItems.map(item => item.category))];
      categories.forEach(cat => {
        const option = document.createElement("option");
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    function filterItems() {
      const search = searchInput.value.trim().toLowerCase();
      const category = categoryFilter.value;

      return menuItems.filter(item => {
        const text = `${item.id} ${item.name} ${item.desc} ${item.category}`.toLowerCase();
        const matchesSearch = text.includes(search);
        const matchesCategory = category === "all" || item.category === category;
        return matchesSearch && matchesCategory;
      });
    }

    function renderItems() {
      const items = filterItems();
      menuGrid.innerHTML = "";
      resultCount.textContent = `${items.length} Gerichte`;

      if (!items.length) {
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      items.forEach(item => {
        const card = document.createElement("article");
        card.className = "card";
        card.tabIndex = 0;

        card.innerHTML = `
          <div class="card-image">🍜</div>
          <div class="card-content">
            <div class="card-top">
              <h3>${item.id}. ${item.name}</h3>
              <div class="price">${item.price}</div>
            </div>
            <div class="desc">${item.desc}</div>
            <div class="meta">
              <span class="badge">${item.category}</span>
            </div>
          </div>
        `;

        card.addEventListener("click", () => openLightbox(item));
        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openLightbox(item);
          }
        });

        menuGrid.appendChild(card);
      });
    }

    function openLightbox(item) {
      lightboxInfo.innerHTML = `
        <strong>${item.id}. ${item.name}</strong><br>
        ${item.desc}<br>
        <strong>${item.price}</strong>
      `;
      lightbox.classList.add("show");
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("show");
      document.body.style.overflow = "";
    }

    searchInput.addEventListener("input", renderItems);
    categoryFilter.addEventListener("change", renderItems);
    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      categoryFilter.value = "all";
      renderItems();
    });

    closeBtn.addEventListener("click", closeLightbox);
    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeLightbox();
    });

    initCategories();
    renderItems();
  </script>
